<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Pillar Two rule order</title>
  <desc id="desc">A visual showing that QDMTT applies first, then IIR, then UTPR as a backstop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08110f"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <style>
      .title{font-family:Inter,Arial,sans-serif;fill:#f8fafc;font-weight:800;letter-spacing:0}.label{font-family:Inter,Arial,sans-serif;fill:#e2e8f0;font-weight:700;letter-spacing:0}.muted{font-family:Inter,Arial,sans-serif;fill:#a8b3bf;font-weight:500;letter-spacing:0}.card{fill:rgba(15,23,42,.76);stroke:rgba(226,232,240,.16);stroke-width:1.5}.one{stroke:#2dd4bf}.two{stroke:#facc15}.three{stroke:#60a5fa}.arrow{stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}.num{font-family:Inter,Arial,sans-serif;font-weight:800;fill:#071014}
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="72" y="88" class="muted" font-size="18">COLLECTION ORDER</text>
  <text x="72" y="150" class="title" font-size="46">Which rule collects?</text>
  <g transform="translate(88 240)">
    <rect class="card one" x="0" y="0" width="288" height="138" rx="8"/>
    <circle cx="42" cy="42" r="18" fill="#2dd4bf"/><text x="36" y="49" class="num" font-size="20">1</text>
    <text x="78" y="52" class="label" font-size="34">QDMTT</text>
    <text x="30" y="98" class="muted" font-size="22">Domestic collection</text>
  </g>
  <path class="arrow" d="M392 309H452"/><path class="arrow" d="M432 297l20 12-20 12"/>
  <g transform="translate(468 240)">
    <rect class="card two" x="0" y="0" width="288" height="138" rx="8"/>
    <circle cx="42" cy="42" r="18" fill="#facc15"/><text x="35" y="49" class="num" font-size="20">2</text>
    <text x="78" y="52" class="label" font-size="34">IIR</text>
    <text x="30" y="98" class="muted" font-size="22">Parent jurisdiction</text>
  </g>
  <path class="arrow" d="M772 309H832"/><path class="arrow" d="M812 297l20 12-20 12"/>
  <g transform="translate(848 240)">
    <rect class="card three" x="0" y="0" width="288" height="138" rx="8"/>
    <circle cx="42" cy="42" r="18" fill="#60a5fa"/><text x="35" y="49" class="num" font-size="20">3</text>
    <text x="78" y="52" class="label" font-size="34">UTPR</text>
    <text x="30" y="98" class="muted" font-size="22">Backstop allocation</text>
  </g>
</svg>