<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Pillar Two global minimum tax visual</title>
  <desc id="desc">A dark blue infographic showing a 15 percent global minimum tax floor and the three rules QDMTT, IIR, and UTPR.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.58 0 0 0 0 1 0 0 0 0.35 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: Inter, Arial, sans-serif; fill: #e2e8f0; font-weight: 800; letter-spacing: -0.03em; }
      .muted { font-family: Inter, Arial, sans-serif; fill: #94a3b8; font-weight: 500; }
      .small { font-size: 24px; }
      .tiny { font-size: 18px; }
      .rule { font-size: 34px; }
      .line { stroke: rgba(148, 163, 184, 0.28); stroke-width: 2; fill: none; }
      .accent-line { stroke: url(#accent); stroke-width: 5; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="945" cy="128" r="210" fill="#60a5fa" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="250" cy="560" r="220" fill="#22d3ee" opacity="0.06" filter="url(#softGlow)"/>

  <text x="72" y="94" class="muted tiny" letter-spacing="0.14em">PILLAR TWO FUNDAMENTALS</text>
  <text x="72" y="155" class="label" font-size="54">Global minimum tax</text>
  <text x="72" y="203" class="muted small">A 15% floor, measured by jurisdiction, with top-up tax collected through ordered rules.</text>

  <g transform="translate(76 292)">
    <rect x="0" y="0" width="1048" height="126" rx="18" fill="rgba(11, 18, 32, 0.94)" stroke="rgba(96, 165, 250, 0.28)"/>
    <line x1="50" y1="80" x2="998" y2="80" class="accent-line"/>
    <text x="50" y="52" class="label" font-size="46">15%</text>
    <text x="139" y="52" class="muted small">minimum effective tax rate</text>
    <text x="50" y="111" class="muted tiny">If a jurisdictional ETR falls below the floor, the difference becomes top-up tax.</text>
  </g>

  <g transform="translate(76 478)">
    <rect x="0" y="0" width="304" height="126" rx="18" fill="rgba(15, 23, 42, 0.92)" stroke="rgba(148, 163, 184, 0.22)"/>
    <text x="26" y="46" class="label rule">QDMTT</text>
    <text x="26" y="80" class="muted tiny">Local jurisdiction collects first</text>
    <text x="26" y="106" class="muted tiny">when domestic rule qualifies.</text>
  </g>

  <g transform="translate(448 478)">
    <rect x="0" y="0" width="304" height="126" rx="18" fill="rgba(15, 23, 42, 0.92)" stroke="rgba(96, 165, 250, 0.30)"/>
    <text x="26" y="46" class="label rule">IIR</text>
    <text x="26" y="80" class="muted tiny">Parent jurisdiction collects</text>
    <text x="26" y="106" class="muted tiny">remaining top-up tax.</text>
  </g>

  <g transform="translate(820 478)">
    <rect x="0" y="0" width="304" height="126" rx="18" fill="rgba(15, 23, 42, 0.92)" stroke="rgba(34, 211, 238, 0.28)"/>
    <text x="26" y="46" class="label rule">UTPR</text>
    <text x="26" y="80" class="muted tiny">Backup rule allocates tax</text>
    <text x="26" y="106" class="muted tiny">where IIR does not apply.</text>
  </g>

  <path d="M380 541H448" class="line"/>
  <path d="M752 541H820" class="line"/>
  <path d="M424 531l24 10-24 10" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M796 531l24 10-24 10" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(818 126)">
    <rect x="0" y="0" width="306" height="94" rx="18" fill="rgba(96, 165, 250, 0.10)" stroke="rgba(96, 165, 250, 0.32)"/>
    <text x="24" y="40" class="label" font-size="28">ETR below 15%</text>
    <text x="24" y="70" class="muted tiny">Top-up tax is triggered</text>
  </g>
</svg>