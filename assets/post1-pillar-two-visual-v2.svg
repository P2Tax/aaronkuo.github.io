<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Pillar Two global minimum tax visual</title>
  <desc id="desc">A clean infographic showing the 15 percent Pillar Two tax floor and the QDMTT, IIR, and UTPR collection order.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071014"/>
      <stop offset="0.58" stop-color="#0c151b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <linearGradient id="gap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <style>
      .title { font-family: Inter, Arial, sans-serif; fill: #f8fafc; font-weight: 800; letter-spacing: 0; }
      .label { font-family: Inter, Arial, sans-serif; fill: #e2e8f0; font-weight: 700; letter-spacing: 0; }
      .muted { font-family: Inter, Arial, sans-serif; fill: #a8b3bf; font-weight: 500; letter-spacing: 0; }
      .panel { fill: rgba(2, 6, 23, 0.58); stroke: rgba(226, 232, 240, 0.14); stroke-width: 1.5; }
      .card { fill: rgba(15, 23, 42, 0.72); stroke: rgba(226, 232, 240, 0.18); stroke-width: 1.5; }
      .grid { stroke: rgba(226, 232, 240, 0.08); stroke-width: 1; }
      .arrow { stroke: #a8b3bf; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M86 238H1114M86 372H1114M86 506H1114" class="grid"/>
  <path d="M300 200V575M600 200V575M900 200V575" class="grid"/>

  <text x="86" y="95" class="muted" font-size="18">PILLAR TWO FUNDAMENTALS</text>
  <text x="86" y="158" class="title" font-size="50">Global minimum tax</text>
  <text x="86" y="205" class="muted" font-size="24">15% floor. Jurisdictional test. Ordered collection rules.</text>

  <g transform="translate(86 265)">
    <rect class="panel" x="0" y="0" width="1028" height="138" rx="8"/>
    <text x="42" y="58" class="label" font-size="34">ETR test</text>
    <text x="42" y="100" class="muted" font-size="22">Below 15% creates top-up tax.</text>

    <line x1="460" y1="84" x2="942" y2="84" stroke="rgba(226, 232, 240, 0.22)" stroke-width="18" stroke-linecap="round"/>
    <line x1="460" y1="84" x2="650" y2="84" stroke="url(#gap)" stroke-width="18" stroke-linecap="round"/>
    <line x1="650" y1="84" x2="942" y2="84" stroke="url(#floor)" stroke-width="18" stroke-linecap="round"/>
    <text x="460" y="52" class="muted" font-size="18">Top-up</text>
    <text x="632" y="52" class="label" font-size="24">15%</text>
    <text x="790" y="52" class="muted" font-size="18">Floor</text>
  </g>

  <g transform="translate(86 492)">
    <rect class="card" x="0" y="0" width="300" height="108" rx="8"/>
    <text x="32" y="48" class="label" font-size="34">QDMTT</text>
    <text x="32" y="82" class="muted" font-size="20">Local first</text>
  </g>

  <g transform="translate(450 492)">
    <rect class="card" x="0" y="0" width="300" height="108" rx="8"/>
    <text x="32" y="48" class="label" font-size="34">IIR</text>
    <text x="32" y="82" class="muted" font-size="20">Parent rule</text>
  </g>

  <g transform="translate(814 492)">
    <rect class="card" x="0" y="0" width="300" height="108" rx="8"/>
    <text x="32" y="48" class="label" font-size="34">UTPR</text>
    <text x="32" y="82" class="muted" font-size="20">Backstop</text>
  </g>

  <path d="M386 546H450" class="arrow"/>
  <path d="M750 546H814" class="arrow"/>
  <path d="M430 536l20 10-20 10" class="arrow"/>
  <path d="M794 536l20 10-20 10" class="arrow"/>
</svg>