<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Pillar Two scope threshold</title>
  <desc id="desc">A compact visual showing that Pillar Two applies to multinational groups above the EUR 750 million revenue threshold.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08110f"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <style>
      .title{font-family:Inter,Arial,sans-serif;fill:#f8fafc;font-weight:800;letter-spacing:0}.label{font-family:Inter,Arial,sans-serif;fill:#e2e8f0;font-weight:700;letter-spacing:0}.muted{font-family:Inter,Arial,sans-serif;fill:#a8b3bf;font-weight:500;letter-spacing:0}.panel{fill:rgba(15,23,42,.74);stroke:rgba(226,232,240,.16);stroke-width:1.5}.accent{fill:#2dd4bf}.warn{fill:#facc15}.line{stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round;fill:none}
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="72" y="86" class="muted" font-size="18">SCOPE TEST</text>
  <text x="72" y="148" class="title" font-size="46">Who is in scope?</text>
  <g transform="translate(82 220)">
    <rect class="panel" x="0" y="0" width="280" height="140" rx="8"/>
    <text x="30" y="58" class="label" font-size="30">MNE group</text>
    <text x="30" y="98" class="muted" font-size="22">Consolidated revenue</text>
  </g>
  <path class="line" d="M382 290H500"/><path class="line" d="M480 278l22 12-22 12"/>
  <g transform="translate(520 190)">
    <rect class="panel" x="0" y="0" width="300" height="200" rx="8"/>
    <text x="38" y="78" class="warn" font-family="Inter,Arial,sans-serif" font-size="58" font-weight="800">EUR 750m</text>
    <text x="38" y="128" class="label" font-size="28">threshold</text>
    <text x="38" y="164" class="muted" font-size="20">annual revenue test</text>
  </g>
  <path class="line" d="M840 290H958"/><path class="line" d="M938 278l22 12-22 12"/>
  <g transform="translate(980 220)">
    <rect class="panel" x="0" y="0" width="140" height="140" rx="8"/>
    <circle cx="70" cy="54" r="24" class="accent"/>
    <path d="M58 54l9 9 18-22" stroke="#071014" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="36" y="108" class="label" font-size="24">In scope</text>
  </g>
</svg>