<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family | Aaron Kuo</title>
  <meta name="description" content="Family | Aaron Kuo." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --line: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --max: 1040px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a { text-decoration: none; color: inherit; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(2, 6, 23, 0.82);
      border-bottom: 1px solid rgba(30, 41, 59, 0.85);
    }

    .nav-inner, .container, .footer-inner {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 72px;
      gap: 20px;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand img {
      height: 44px;
      width: auto;
      display: block;
    }

    .brand-mark {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0;
      display: none;
    }

    .nav-links {
      display: flex;
      gap: 22px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 14px;
    }

    .nav-links a.active,
    .nav-links a:hover {
      color: var(--text);
    }

    .container {
      padding: 70px 0 84px;
    }

    h1 {
      font-size: 56px;
      line-height: 1.05;
      letter-spacing: 0;
      margin: 0;
    }

    footer {
      border-top: 1px solid rgba(30, 41, 59, 0.85);
      margin-top: 20px;
    }

    .footer-inner {
      padding: 24px 0 40px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 560px) {
      .nav-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 0;
      }

      .container {
        padding-top: 46px;
      }

      h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="brand-wrap">
        <a href="index.html" class="brand">
          <img src="logo3.png" alt="Aaron Kuo logo">
        </a>
        <a href="index.html" class="brand-mark">AK</a>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="thoughts.html">Thoughts</a>
        <a href="book.html">Book</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="family.html" class="active">Family</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <h1>Family</h1>
  </main>

  <footer>
    <div class="footer-inner">&copy; 2026 Aaron Kuo</div>
  </footer>
</body>
</html>
